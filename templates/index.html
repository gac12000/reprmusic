<!DOCTYPE html>
<html>
<head>
    <title>Auto-Player Replit</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { border: 1px solid #0f0; padding: 10px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; width: 90%; margin-bottom: 5px; }
        button { background: #0f0; color: #000; padding: 10px; width: 100%; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>SYSTEM AUTO-PLAYER (8 SLOTS)</h1>
    <form action="/programar" method="post">
        <div class="grid">
            {% for i in range(8) %}
            <div class="box">
                Slot {{ i+1 }}<br>
                <input type="text" name="url_{{ i }}" placeholder="URL">
                <input type="time" name="inicio_{{ i }}">
                <input type="time" name="fin_{{ i }}">
            </div>
            {% endfor %}
        </div>
        <br>
        <button type="submit">ACTIVAR EN REPLIT</button>
    </form>
</body>
</html>
